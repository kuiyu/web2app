<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自适应布局测试</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        
        /* 自适应容器 */
        .responsive-container {
            width: 100%;
            height: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        /* 测试网格 */
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .test-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .test-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .test-card h3 {
            font-size: 1.4em;
            margin-bottom: 15px;
            color: #ffdd40;
        }
        
        .test-card p {
            font-size: 0.95em;
            line-height: 1.5;
            opacity: 0.9;
        }
        
        /* 尺寸显示器 */
        .size-display {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .size-display .label {
            color: #4cd964;
            font-weight: bold;
        }
        
        /* 状态指示器 */
        .status-indicator {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 1000;
        }
        
        .status-good {
            color: #4cd964;
        }
        
        .status-warning {
            color: #ff9500;
        }
        
        /* 自适应测试区域 */
        .responsive-test {
            width: 100%;
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .responsive-test h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #ffdd40;
        }
        
        .responsive-boxes {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .responsive-box {
            flex: 1;
            min-width: 150px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        /* 媒体查询测试 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .test-grid {
                grid-template-columns: 1fr;
            }
            
            .responsive-box {
                min-width: 120px;
                height: 80px;
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.6em;
            }
            
            .test-card {
                padding: 20px;
            }
            
            .responsive-box {
                min-width: 100px;
                height: 70px;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
        .delay-4 { animation-delay: 0.4s; opacity: 0; }
    </style>
</head>
<body>
    <div class="responsive-container">
        <div class="header fade-in">
            <h1>📐 自适应布局测试</h1>
            <p>测试WebAppLauncher的自适应缩放功能</p>
        </div>
        
        <div class="test-grid">
            <div class="test-card fade-in delay-1">
                <h3>布局自适应</h3>
                <p>测试页面布局是否根据窗体大小自动调整</p>
            </div>
            
            <div class="test-card fade-in delay-2">
                <h3>内容缩放</h3>
                <p>验证内容是否自动缩放至合适大小</p>
            </div>
            
            <div class="test-card fade-in delay-3">
                <h3>无滚动条</h3>
                <p>确认页面没有出现滚动条</p>
            </div>
            
            <div class="test-card fade-in delay-4">
                <h3>响应式设计</h3>
                <p>测试不同尺寸下的显示效果</p>
            </div>
        </div>
        
        <div class="responsive-test fade-in">
            <h3>自适应盒子测试</h3>
            <div class="responsive-boxes">
                <div class="responsive-box">自适应盒子 1</div>
                <div class="responsive-box">自适应盒子 2</div>
                <div class="responsive-box">自适应盒子 3</div>
                <div class="responsive-box">自适应盒子 4</div>
                <div class="responsive-box">自适应盒子 5</div>
            </div>
        </div>
    </div>
    
    <div class="status-indicator">
        状态: <span id="status" class="status-good">等待缩放...</span>
    </div>
    
    <div class="size-display">
        <div>窗体: <span id="window-size" class="label">0×0</span> px</div>
        <div>视口: <span id="viewport-size" class="label">0×0</span> px</div>
        <div>缩放: <span id="zoom-level" class="label">100%</span></div>
    </div>
    
    <script>
        // 更新尺寸显示
        function updateSizeDisplay() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            document.getElementById('window-size').textContent = 
                `${windowWidth}×${windowHeight}`;
            
            document.getElementById('viewport-size').textContent = 
                `${document.documentElement.clientWidth}×${document.documentElement.clientHeight}`;
            
            // 计算缩放级别（基于视口与body的比例）
            const bodyWidth = document.body.scrollWidth;
            const bodyHeight = document.body.scrollHeight;
            const scaleX = windowWidth / bodyWidth;
            const scaleY = windowHeight / bodyHeight;
            const scale = Math.min(scaleX, scaleY) * 100;
            
            document.getElementById('zoom-level').textContent = 
                `${scale.toFixed(1)}%`;
            
            // 更新状态
            const statusElement = document.getElementById('status');
            if (scale < 80) {
                statusElement.textContent = '缩放中...';
                statusElement.className = 'status-warning';
            } else if (scale > 120) {
                statusElement.textContent = '放大中...';
                statusElement.className = 'status-warning';
            } else {
                statusElement.textContent = '正常';
                statusElement.className = 'status-good';
            }
        }
        
        // 监听窗口大小变化
        window.addEventListener('resize', updateSizeDisplay);
        
        // 监听来自宿主应用的消息
        window.chrome.webview.addEventListener('message', function(event) {
            console.log('收到宿主应用消息:', event.data);
            
            const statusElement = document.getElementById('status');
            if (event.data.includes('响应式缩放')) {
                statusElement.textContent = '自适应缩放已应用';
                statusElement.className = 'status-good';
                
                // 显示通知
                showNotification('自适应缩放已应用');
            }
        });
        
        // 显示通知
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 20px 30px;
                border-radius: 10px;
                z-index: 2000;
                font-size: 16px;
                text-align: center;
                animation: fadeIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }
        
        // 初始化和发送页面加载完成消息
        window.addEventListener('load', function() {
            updateSizeDisplay();
            
            // 发送页面加载完成消息
            window.chrome.webview.postMessage('自适应测试页面已加载完成');
            
            console.log('自适应测试页面已加载，等待缩放应用');
        });
        
        // 定期更新尺寸显示
        setInterval(updateSizeDisplay, 1000);
    </script>
</body>
</html>
